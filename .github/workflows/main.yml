name: Main

on:
  push:
    branches:
      - master
      - "push-action/**"
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  main-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node and pnpm
        uses: silverhand-io/actions-node-pnpm-run-steps@v5
        with:
          pnpm-version: 10
          node-version: ^22.14.0

      - name: Build
        run: pnpm ci:build

  main-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node and pnpm
        uses: silverhand-io/actions-node-pnpm-run-steps@v5
        with:
          pnpm-version: 10
          node-version: ^22.14.0

      - name: Prepack
        run: pnpm prepack

      - name: Check
        run: pnpm -r check

  main-lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node and pnpm
        uses: silverhand-io/actions-node-pnpm-run-steps@v5
        with:
          pnpm-version: 10
          node-version: ^22.14.0

      - name: Prepack
        run: pnpm prepack

      - name: Lint
        run: pnpm ci:lint

      - name: Stylelint
        run: pnpm ci:stylelint

  main-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node and pnpm
        uses: silverhand-io/actions-node-pnpm-run-steps@v5
        with:
          pnpm-version: 10
          node-version: ^22.14.0

      - name: Build for test
        run: pnpm -r build:test

      - name: Install playwright for element tests
        working-directory: ./packages/elements
        run: pnpm exec playwright install --with-deps

      - name: Test
        run: pnpm ci:test

  main-dockerize:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build
        uses: docker/build-push-action@v6
        with:
          context: .
          build-args: |
            additional_connector_args=--cloud

  main-alteration:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: ./fresh

      - id: version
        working-directory: ./fresh
        shell: bash
        run: |
          current_tag="$(git describe --match "@logto/core@*" --abbrev=0 2>/dev/null || true)"

          echo "current=$current_tag" >> "$GITHUB_OUTPUT"

          if [ -n "$current_tag" ]; then
            echo "has_tag=true" >> "$GITHUB_OUTPUT"
            echo "version=${current_tag##*@}" >> "$GITHUB_OUTPUT"
          else
            echo "has_tag=false" >> "$GITHUB_OUTPUT"
            echo "version=" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping main-alteration historical checks because no @logto/core@* tag exists in this repository."
          fi

      - uses: actions/checkout@v4
        if: steps.version.outputs.has_tag == 'true'
        with:
          ref: ${{ steps.version.outputs.current }}
          path: ./alteration

      - name: Copy lockfile
        if: steps.version.outputs.has_tag == 'true'
        run: cp ./fresh/pnpm-lock.yaml ./

      - name: Setup Node and pnpm
        if: steps.version.outputs.has_tag == 'true'
        uses: silverhand-io/actions-node-pnpm-run-steps@v5
        with:
          pnpm-version: 10
          node-version: ^22.14.0
          run-install: false

      - name: Prepack fresh
        if: steps.version.outputs.has_tag == 'true'
        working-directory: ./fresh
        run: pnpm i && pnpm prepack

      - name: Prepack alteration
        if: steps.version.outputs.has_tag == 'true'
        working-directory: ./alteration
        run: pnpm i && pnpm prepack

      - name: Setup Postgres
        if: steps.version.outputs.has_tag == 'true'
        uses: ikalnytskyi/action-setup-postgres@v6

      - name: Setup fresh database
        if: steps.version.outputs.has_tag == 'true'
        working-directory: ./fresh
        run: pnpm cli db seed --test
        env:
          DB_URL: postgres://postgres:postgres@localhost:5432/fresh

      - name: Setup alteration database
        if: steps.version.outputs.has_tag == 'true'
        working-directory: ./alteration
        run: |
          cd packages/cli
          pnpm start db seed --test
        env:
          DB_URL: postgres://postgres:postgres@localhost:5432/alteration

      - name: Run alteration scripts
        if: steps.version.outputs.has_tag == 'true'
        working-directory: ./fresh
        run: pnpm cli db alt deploy next
        env:
          ALTERATION_TEST: true
          DB_URL: postgres://postgres:postgres@localhost:5432/alteration

      - name: Compare databases
        if: steps.version.outputs.has_tag == 'true'
        working-directory: ./fresh
        run: node .scripts/compare-database.js fresh alteration

      - name: Setup old database
        if: steps.version.outputs.has_tag == 'true'
        working-directory: ./alteration
        run: |
          cd packages/cli
          pnpm start db seed --test
        env:
          DB_URL: postgres://postgres:postgres@localhost:5432/old

      - name: Revert fresh database to old
        if: steps.version.outputs.has_tag == 'true'
        working-directory: ./fresh
        run: pnpm cli db alt r v${{ steps.version.outputs.version }}
        env:
          ALTERATION_TEST: true
          DB_URL: postgres://postgres:postgres@localhost:5432/fresh

      - name: Compare manifests
        if: steps.version.outputs.has_tag == 'true'
        working-directory: ./fresh
        run: node .scripts/compare-database.js fresh old

      - name: Check alteration sequence
        if: steps.version.outputs.has_tag == 'true'
        working-directory: ./fresh
        run: node .scripts/check-alterations-sequence.js
