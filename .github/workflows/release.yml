name: Release

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}

jobs:
  # Build and push versioned multi-platform image on tag push
  dockerize:
    if: startsWith(github.ref, 'refs/tags/')
    environment: release
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tags
        id: release
        shell: bash
        run: |
          ref_name="${GITHUB_REF_NAME}"
          raw_version="${ref_name#v}"
          release_version="${raw_version%%-bytars.*}"

          if [[ ! "$release_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Tag '$ref_name' does not contain a valid release version."
            exit 1
          fi

          IFS='.' read -r major minor patch <<< "$release_version"

          {
            echo "release_version=$release_version"
            echo "major=$major"
            echo "minor=$minor"
            echo 'tags<<EOF'
            echo "registry.bytars.com/bytars/logto:$release_version"
            echo "registry.bytars.com/bytars/logto:$major.$minor"
            echo "registry.bytars.com/bytars/logto:$major"
            echo "registry.bytars.com/bytars/logto:$ref_name"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Bytars Registry
        uses: docker/login-action@v3
        with:
          registry: registry.bytars.com
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          platforms: linux/amd64,linux/arm64
          context: .
          push: true
          tags: ${{ steps.release.outputs.tags }}

  create-github-release:
    environment: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node and pnpm
        uses: silverhand-io/actions-node-pnpm-run-steps@v5
        with:
          pnpm-version: 10
          node-version: ^22.14.0

      - name: Build
        run: pnpm -r build

      - name: Package
        run: ./.scripts/package.sh

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          body: ""
          files: /tmp/logto.tar.gz
          append_body: true
